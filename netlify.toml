[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["iyzipay"]

# تذكير السلّة المتروكة — ⚠️ مؤقّت للاختبار: كل دقيقة (الأصل "@hourly")
[functions."cart-reminders"]
  schedule = "* * * * *"

# تمرير مسارات الدوال قبل توجيه SPA (يبقى _redirects كما هو للباقي)
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
